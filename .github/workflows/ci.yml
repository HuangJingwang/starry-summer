name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check PR health
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run ops:pr-health -- --pr ${{ github.event.pull_request.number }} --ignore-check Verify

      - name: Enable auto-merge
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'codex/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto --match-head-commit ${{ github.event.pull_request.head.sha }}
