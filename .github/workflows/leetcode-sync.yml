name: LeetCode Sync

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync:leetcode -- --username adonis-14
      - name: Commit dashboard changes
        run: |
          if git diff --quiet -- apps/web/content/leetcode/dashboard.json; then
            echo "No LeetCode dashboard changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/content/leetcode/dashboard.json
          git commit -m "data: sync leetcode progress"
          git push
