name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  smoke:
    name: Smoke https://www.asterh.me
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke
        run: npm run ops:production-smoke -- --base-url https://www.asterh.me
