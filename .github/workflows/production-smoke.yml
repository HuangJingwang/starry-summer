name: Production Smoke

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - vercel.deployment.success
      - vercel.deployment.error
      - vercel.deployment.failed
  schedule:
    - cron: "17 * * * *"

jobs:
  smoke:
    name: Smoke https://www.asterh.me
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'repository_dispatch' || github.event.action == 'vercel.deployment.success'
        run: npm ci

      - name: Run production smoke
        if: github.event_name != 'repository_dispatch' || github.event.action == 'vercel.deployment.success'
        run: npm run ops:production-smoke -- --base-url https://www.asterh.me

      - name: Report Vercel deployment failure
        if: github.event_name == 'repository_dispatch' && (github.event.action == 'vercel.deployment.error' || github.event.action == 'vercel.deployment.failed')
        run: |
          echo "Vercel deployment event: ${{ github.event.action }}"
          echo "Deployment URL: ${{ github.event.client_payload.url }}"
          echo "Environment: ${{ github.event.client_payload.environment }}"
          exit 1
