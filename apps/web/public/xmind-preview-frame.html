<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>XMind 预览</title>
    <style>
      html,
      body,
      #mount {
        background: #ffffff;
        height: 100%;
        margin: 0;
        overscroll-behavior: contain;
        overflow: hidden;
        touch-action: none;
        width: 100%;
      }

      body {
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .xmind-frame-error {
        align-items: center;
        box-sizing: border-box;
        display: grid;
        height: 100%;
        justify-items: center;
        padding: 24px;
        text-align: center;
      }

      .xmind-frame-error p {
        color: #475569;
        line-height: 1.7;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="mount"></div>
    <script src="https://unpkg.com/xmind-embed-viewer@1.2.0/dist/umd/xmind-embed-viewer.js"></script>
    <script>
      const messagePrefix = 'starry-xmind-preview:';
      const minimumReadableZoom = 50;

      function notify(type, payload) {
        window.parent.postMessage({ type: `${messagePrefix}${type}`, ...payload }, window.location.origin);
      }

      function showError(message) {
        document.body.innerHTML = '<div class="xmind-frame-error"><p></p></div>';
        document.querySelector('p').textContent = message;
        notify('error', { message });
      }

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const fileParam = params.get('file') || '';
        const title = params.get('title') || 'XMind 脑图';
        const fileUrl = new URL(fileParam, window.location.origin);

        document.title = `${title} - XMind 预览`;

        if (fileUrl.origin !== window.location.origin || !/\.xmind(?:$|[?#])/i.test(fileUrl.pathname + fileUrl.search + fileUrl.hash)) {
          showError('只支持预览本站托管的 XMind 文件。');
          return;
        }

        const response = await fetch(fileUrl.href);

        if (!response.ok) {
          showError(`XMind 文件请求失败：${response.status}`);
          return;
        }

        const viewer = new XMindEmbedViewer({
          el: '#mount',
          region: 'global',
          styles: {
            height: '100%',
            width: '100%',
          },
        });

        function getZoomScale() {
          return Number(viewer.zoomScale ?? viewer.zoom);
        }

        function enforceReadableZoom() {
          const zoomScale = getZoomScale();

          if (!Number.isFinite(zoomScale) || zoomScale < minimumReadableZoom) {
            viewer.setZoomScale(minimumReadableZoom);
            return minimumReadableZoom;
          }

          return zoomScale;
        }

        viewer.addEventListener('map-ready', () => {
          window.setTimeout(() => {
            const zoomScale = enforceReadableZoom();
            notify('ready', { zoomScale });
          }, 0);
          window.setTimeout(enforceReadableZoom, 400);
        });

        viewer.addEventListener('zoom-change', () => {
          const zoomScale = getZoomScale();

          if (Number.isFinite(zoomScale) && zoomScale < minimumReadableZoom) {
            window.requestAnimationFrame(() => viewer.setZoomScale(minimumReadableZoom));
          }
        });

        viewer.load(await response.arrayBuffer());
      }

      init().catch((error) => {
        showError(error instanceof Error ? error.message : 'XMind 预览不可用');
      });
    </script>
  </body>
</html>
