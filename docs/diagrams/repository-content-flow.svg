<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Starry Summer repository content flow</title>
  <desc id="desc">A diagram showing how authoring, repository content, Next.js, Vercel, and public readers connect in Starry Summer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#102334"/>
      <stop offset="1" stop-color="#f8faf7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10243a" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#173348" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#06111f" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect width="1120" height="520" rx="34" fill="url(#bg)"/>
  <g opacity="0.3">
    <circle cx="112" cy="86" r="2.5" fill="#bff8f1"/>
    <circle cx="194" cy="152" r="1.8" fill="#bff8f1"/>
    <circle cx="934" cy="96" r="2.2" fill="#102334"/>
    <circle cx="1018" cy="172" r="1.8" fill="#102334"/>
    <circle cx="768" cy="64" r="1.6" fill="#bff8f1"/>
  </g>
  <text x="64" y="70" fill="#e9fffb" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800">Repository-backed content flow</text>
  <text x="64" y="103" fill="#b8d9d6" font-family="Inter, system-ui, sans-serif" font-size="16">Content stays portable in Git. The app turns repository files into public pages and admin workflows.</text>

  <g filter="url(#shadow)">
    <rect x="64" y="170" width="190" height="132" rx="22" fill="url(#card)" stroke="#56e4d8" stroke-opacity="0.35"/>
    <text x="92" y="212" fill="#dffffb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="750">Admin workspace</text>
    <text x="92" y="242" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">Write posts, settings,</text>
    <text x="92" y="263" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">assets, projects</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="338" y="150" width="220" height="172" rx="26" fill="#f7fbf8" stroke="#d0e5df"/>
    <text x="376" y="195" fill="#0c1d2b" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">GitHub repository</text>
    <text x="376" y="229" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">apps/web/content</text>
    <text x="376" y="252" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">Markdown + JSON</text>
    <text x="376" y="275" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">assets manifest</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="644" y="170" width="190" height="132" rx="22" fill="url(#card)" stroke="#56e4d8" stroke-opacity="0.35"/>
    <text x="678" y="212" fill="#dffffb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="750">Next.js app</text>
    <text x="678" y="242" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">Read content files,</text>
    <text x="678" y="263" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">render routes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="898" y="150" width="158" height="172" rx="26" fill="#f7fbf8" stroke="#d0e5df"/>
    <text x="933" y="195" fill="#0c1d2b" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">Readers</text>
    <text x="933" y="229" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">Public pages</text>
    <text x="933" y="252" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">Search / RSS</text>
    <text x="933" y="275" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">Guestbook</text>
  </g>

  <path d="M254 236 C282 236 302 236 329 236" fill="none" stroke="#4fd1c5" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M558 236 C590 236 608 236 635 236" fill="none" stroke="#4fd1c5" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M834 236 C858 236 872 236 889 236" fill="none" stroke="#4fd1c5" stroke-width="3.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="274" y="363" width="572" height="82" rx="22" fill="#0b1828" fill-opacity="0.72" stroke="#72f0e5" stroke-opacity="0.28"/>
    <text x="308" y="397" fill="#dffffb" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="750">Why this shape?</text>
    <text x="308" y="423" fill="#b8d9d6" font-family="Inter, system-ui, sans-serif" font-size="14">Readable site, versioned content, simple backups, easy migration, fewer always-on services.</text>
  </g>
</svg>
