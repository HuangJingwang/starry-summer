<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Starry Summer deployment and feedback flow</title>
  <desc id="desc">A diagram showing GitHub, GitHub Actions, Vercel, production smoke, and local Codex post-push watcher feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#102334"/>
      <stop offset="1" stop-color="#eef8f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#06111f" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect width="1120" height="520" rx="34" fill="url(#bg)"/>
  <text x="64" y="70" fill="#e9fffb" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800">Deployment and feedback loop</text>
  <text x="64" y="103" fill="#b8d9d6" font-family="Inter, system-ui, sans-serif" font-size="16">Push once, let GitHub and Vercel do the heavy lifting, then bring the result back to local Codex.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="178" height="124" rx="22" fill="#10243a" stroke="#56e4d8" stroke-opacity="0.36"/>
    <text x="105" y="212" fill="#dffffb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="750">Local Codex</text>
    <text x="105" y="242" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">git push</text>
    <text x="105" y="263" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">PostToolUse hook</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="150" width="178" height="164" rx="24" fill="#f8fbf8" stroke="#d0e5df"/>
    <text x="365" y="194" fill="#0c1d2b" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="800">GitHub</text>
    <text x="365" y="228" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">branch / PR</text>
    <text x="365" y="251" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">checks</text>
    <text x="365" y="274" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">statuses</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="588" y="170" width="178" height="124" rx="22" fill="#10243a" stroke="#56e4d8" stroke-opacity="0.36"/>
    <text x="631" y="212" fill="#dffffb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="750">Vercel</text>
    <text x="631" y="242" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">build</text>
    <text x="631" y="263" fill="#a6c7c5" font-family="Inter, system-ui, sans-serif" font-size="14">deploy</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="846" y="150" width="202" height="164" rx="24" fill="#f8fbf8" stroke="#d0e5df"/>
    <text x="884" y="194" fill="#0c1d2b" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="800">Production smoke</text>
    <text x="884" y="228" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">route checks</text>
    <text x="884" y="251" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">identity guard</text>
    <text x="884" y="274" fill="#2e5560" font-family="Inter, system-ui, sans-serif" font-size="14">deployment evidence</text>
  </g>

  <path d="M250 232 C280 232 300 232 321 232" fill="none" stroke="#4fd1c5" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M508 232 C538 232 558 232 579 232" fill="none" stroke="#4fd1c5" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M766 232 C798 232 818 232 837 232" fill="none" stroke="#4fd1c5" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M852 330 C760 402 496 404 234 316" fill="none" stroke="#9af4ed" stroke-width="3" stroke-dasharray="8 10" marker-end="url(#arrow)"/>
  <text x="360" y="402" fill="#dffffb" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">local watcher reads GitHub state with gh</text>

  <g>
    <rect x="272" y="430" width="576" height="52" rx="18" fill="#0b1828" fill-opacity="0.74" stroke="#72f0e5" stroke-opacity="0.28"/>
    <text x="306" y="462" fill="#b8d9d6" font-family="Inter, system-ui, sans-serif" font-size="14">No inbound webhook to your laptop. GitHub is the shared state, Codex watches only after a push.</text>
  </g>
</svg>
