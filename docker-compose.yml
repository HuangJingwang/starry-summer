services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-before-production}
      RELEASE_VERSION: ${RELEASE_VERSION:-development}
      GIT_REVISION: ${GIT_REVISION:-unknown}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(async r => { const body = await r.json(); process.exit(r.ok && body.status === 'ok' ? 0 : 1); }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      web:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-owner@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
