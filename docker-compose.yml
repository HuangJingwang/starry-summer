services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost}
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      WEB_ORIGIN: ${PUBLIC_SITE_URL:-http://localhost}
      DATABASE_URL: ${DATABASE_URL:-postgresql://starry:starry@postgres:5432/starry_summer}
      CONTENT_REPOSITORY_DRIVER: ${CONTENT_REPOSITORY_DRIVER:-postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-starry-summer}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-before-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-owner@example.com}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-replace-with-argon2id-hash}
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-starry_summer}
      POSTGRES_USER: ${POSTGRES_USER:-starry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starry}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - web
      - api
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-owner@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
